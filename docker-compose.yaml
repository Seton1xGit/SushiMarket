# SushiMarket TR — Dashboard + WhatsApp bridge
#
# Один контейнер `dashboard` обслуживает:
#   * UI мониторинга (HTML + Tailwind + Chart.js)
#   * REST API для агрегатов из Postgres
#   * Подключение WhatsApp через QR (whatsapp-web.js, добавится позже)
#   * Внутренний /api/wa/send для отправки из n8n
#
# Порт 8080 биндим только на 127.0.0.1 — наружу выставлять через nginx/Caddy
# с TLS и доменом (например, dashboard.<your-domain>).

name: sushimarket

services:
  dashboard:
    build:
      context: ./services/dashboard
      dockerfile: Dockerfile
    image: sushimarket-dashboard:local
    container_name: sushimarket-dashboard
    env_file:
      - path: ./.env
        required: true
    environment:
      NODE_ENV: production
      PORT: 8080
    ports:
      # Публичный биндинг — дашборд доступен по http://<server-ip>:8080.
      # ⚠ Basic-auth идёт в открытую через HTTP. Перед prod-использованием
      # рекомендуется поставить TLS-reverse-proxy (Caddy/nginx) с https.
      - "0.0.0.0:8080:8080"
    networks:
      - default
      # Подключаем дашборд к внешней сети n8n, чтобы n8n мог
      # достучаться по DNS-имени `sushimarket-dashboard:8080`.
      # Сама сеть создаётся другим compose-проектом (n8n) — поэтому external.
      - n8n_n8n_network
    volumes:
      # Сессия WhatsApp Web сохраняется здесь, чтобы переживать рестарт.
      - ./services/dashboard/data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

networks:
  n8n_n8n_network:
    external: true
